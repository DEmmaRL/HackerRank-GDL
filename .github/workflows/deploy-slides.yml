name: 🚀 Deploy Slides Automatically

on:
  push:
    branches: [ main ]
    paths: [ 'sessions/**' ]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Obtener carpetas cambiadas
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: sessions/**
          dir_names: true
          dir_names_max_depth: 2

      - name: Configurar Matriz Dinámica
        id: set-matrix
        run: |
          # Extrae el nombre de la carpeta y lo convierte a array JSON
          # Filtramos para asegurar que solo procesamos carpetas dentro de sessions/
          DIRS_JSON=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep '^sessions/' | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$DIRS_JSON" >> $GITHUB_OUTPUT
          echo "Detected sessions: $DIRS_JSON"

  deploy:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '[]' && needs.detect-changes.outputs.matrix != '' }}
    strategy:
      matrix:
        session: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Instalar Vercel CLI
        run: npm install --global vercel

      - name: Desplegar sesión aislada (${{ matrix.session }})
        working-directory: ./sessions/${{ matrix.session }}
        run: |
          # Deploy con el nombre de la carpeta como ID de proyecto
          vercel deploy --prod --yes \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --name "hr-gdl-slide-${{ matrix.session }}"
